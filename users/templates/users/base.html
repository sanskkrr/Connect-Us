{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect-Us</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-100" style="font-family: 'Inter', sans-serif;">

    <!-- 🔷 NAVBAR -->
    <nav class="flex justify-between items-center px-8 py-4 bg-white shadow-sm border-b border-gray-200">

        <!-- LEFT: LOGO + NAME -->
        <div class="flex items-center gap-3">

            <!-- Logo -->
            <img src="{% static 'images/navlogo.png' %}" 
                 class="w-10 h-10 object-contain hover:scale-110 transition">

            <!-- Brand Name -->
            <h1 class="text-xl font-semibold tracking-tight"
                style="font-family: 'Poppins', sans-serif;">
                Connect-Us
            </h1>
        </div>

        <!-- RIGHT: AUTH -->
        <div>
            {% if user.is_authenticated %}
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="text-red-500 font-medium hover:text-red-600 transition">
                        Logout
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" 
                   class="text-blue-500 font-medium hover:text-blue-600 transition">
                    Login
                </a>
            {% endif %}
        </div>

    </nav>

    <!-- 🔷 PAGE CONTENT -->
    <main>
        {% block body %}
        {% endblock %}
    </main>

</body>
</html>
