{% extends 'users/base.html' %}
{% load static %}

{% block body %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-100 to-gray-200 px-4">

  <div class="bg-white p-10 rounded-3xl shadow-xl text-center max-w-md w-full">

    <!-- Success Icon -->
    <div class="text-5xl mb-4">✅</div>

    <!-- Heading -->
    <h1 class="text-2xl font-bold mb-2"
        style="font-family: 'Poppins', sans-serif;">
        Registration Successful
    </h1>

    <!-- Message -->
    <p class="text-gray-500 mb-6">
        Your account has been created successfully.  
        You can now log in and start connecting.
    </p>

    <!-- Button -->
    <a href="{% url 'login' %}"
       class="inline-block bg-blue-500 text-white px-6 py-2 rounded-xl hover:bg-blue-600 transition">
        Go to Login
    </a>

  </div>

</div>

{% endblock %}
