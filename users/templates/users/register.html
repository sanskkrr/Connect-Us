
{% extends 'users/base.html' %}
{% load static %}
{% block layout %}
{% block body %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-100 to-gray-200 px-4">

  <div class="w-full max-w-5xl bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row">

    <!-- LEFT: REGISTER FORM -->
    <div class="md:w-1/2 flex items-center justify-center p-8">

      <div class="w-full max-w-md">

        <h1 class="text-3xl font-semibold text-center mb-1 tracking-tight"
            style="font-family: 'Poppins', sans-serif;">
          Connect-Us
        </h1>

        <p class="text-gray-500 text-center text-sm mb-6">
          Sign up to connect with people
        </p>

        <form method="POST" class="space-y-3">
          {% csrf_token %}

          <input type="text" name="username" placeholder="Username"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">

          <input type="email" name="email" placeholder="Email"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">

          <input type="text" name="first_name" placeholder="Full Name"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">

          <input type="password" name="password" placeholder="Password"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">

          <input type="password" name="password2" placeholder="Confirm Password"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">

          <button type="submit"
            class="w-full bg-blue-500 text-white py-3 rounded-xl font-medium hover:bg-blue-600 transition">
            Sign up
          </button>

        </form>

        <p class="text-sm text-center mt-6">
          Already have an account?
          <a href="{% url 'login' %}" class="text-blue-500 font-medium">
            Log in
          </a>
        </p>

      </div>

    </div>

    <!-- RIGHT: IMAGE -->
    <div class="md:w-1/2 h-60 md:h-auto bg-cover bg-center"
         style="background-image: url('{% static 'images/logo11.png' %}')">
    </div>

  </div>

</div>

{% endblock %}
{% endblock %}
