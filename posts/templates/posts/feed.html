{% extends 'users/base.html' %} {% load static %} {% block body %}

<div class="max-w-2xl mx-auto mt-8 space-y-8">
  <!-- 🔷 HEADING -->
  <h1
    class="text-2xl font-bold text-center mb-6"
    style="font-family: &quot;Poppins&quot;, sans-serif"
  >
    Feed
  </h1>

  <!-- 🔷 POSTS -->
  {% for post in posts %}
  <div
    class="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden"
  >
    <!-- USER INFO -->
    <div class="flex items-center gap-3 px-4 py-3">
      <!-- Profile Pic (placeholder) -->
      <div class="w-10 h-10 rounded-full">
        {% if request.user.profile.photo %}
        <img
          src="{{ request.user.profile.photo.url }}"
          class="w-full h-full rounded-full object-cover"
        />
        {% else %}
        <img
          src="{% static 'images/ss.jpg' %}"
          class="w-full h-full rounded-full object-cover"
        />
        {% endif %}
      </div>

      <div>
        <h2 class="font-semibold text-sm">{{ post.user.username }}</h2>
      </div>
    </div>

    <!-- IMAGE -->
    <img src="{{ post.image.url }}" class="w-full max-h-[500px] object-cover" />

    <!-- ACTIONS -->
    <div class="flex gap-4 px-4 py-2 text-gray-600 text-lg">❤️ 💬 🔖</div>

    <!-- CONTENT -->
    <div class="px-4 pb-4">
      <p class="text-sm">
        <span class="font-semibold">{{ post.user.username }}</span>
        {{ post.caption }}
      </p>
    </div>
  </div>
  {% empty %}
  <p class="text-center text-gray-500">No posts available.</p>
  {% endfor %}
</div>

{% endblock %}
