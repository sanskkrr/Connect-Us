{% extends "users/base.html" %}
{% block layout %}
{% block body %}

<div class="min-h-[70vh] flex items-center justify-center">

    <div class="bg-white shadow-md rounded-xl p-6 md:p-8 max-w-md w-full text-center">

        <!-- Icon -->
        <div class="text-4xl mb-4">📩</div>

        <!-- Heading -->
        <h1 class="text-xl md:text-2xl font-semibold mb-2">
            Check your email
        </h1>

        <!-- Message -->
        <p class="text-gray-600 text-sm md:text-base mb-6">
            We’ve sent you a password reset link.  
            Please check your inbox and follow the instructions.
        </p>

        <!-- Button -->
        <a href="{% url 'login' %}"
           class="inline-block bg-black text-white px-5 py-2 rounded-lg hover:bg-gray-800 transition">
            Back to Login
        </a>

    </div>

</div>
{% endblock  %}
{% endblock %}
