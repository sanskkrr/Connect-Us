{% load static %}
<!doctype html>
<html>
  <head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes slideIn {
        from {
          transform: translateX(-60px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .animate-slide-in {
        animation: slideIn 0.8s ease-out;
      }
    </style>
  </head>

  <body class="bg-gray-900" style="font-family: &quot;Inter&quot;, sans-serif">
   
   
   

<!-- TOP CENTER BRAND -->
<div class="w-full flex justify-center pt-6 animate-fade-down">

    <div class="flex items-center gap-3">

        <!-- Logo -->
        <img src="{% static 'images/navlogo.png' %}" 
             class="w-10 h-10 rounded-md">

        <!-- Text -->
        <h1 class="text-2xl text-white  tracking-tight"
            style="font-family: 'Poppins', sans-serif;">
            Connect-Us : Stay Connected, Stay You.
        </h1>

    </div>

</div>


<!--Imageee-->
    <div class="min-h-screen flex items-center justify-center bg-gray-900 p-4">
      <div
        class="w-full max-w-7xl h-[90vh] bg-gray-200 rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row"
      >




        <!-- IMAGE / SLIDESHOW -->




        <div class="md:w-1/2 h-60 md:h-auto relative order-1 md:order-2">
          <div class="absolute inset-0">
            <div class="bg1 absolute inset-0 bg-cover bg-center"></div>
            <div
              class="bg2 absolute inset-0 bg-cover bg-center opacity-0 transition-opacity duration-1000"
            ></div>
          </div>
        </div>






        <!-- FORM -->




        <div
          class="md:w-1/2 flex items-center justify-center p-6 order-2 md:order-1"
        >
          <div class="w-full max-w-md bg-white p-10 rounded-2xl shadow-lg">
            <h1 class="text-4xl font-bold text-center mb-6">Connect-Us</h1>
            <p class="text-gray-500 text-center mb-12">
              Stay connected. Stay you.
            </p>

            <h2 class="text-lg mb-4 text-center">Login</h2>
            {% if form.non_field_errors %}
<div class="bg-red-100 text-red-600 px-4 py-2 rounded-lg mb-4 text-sm">
    {{ form.non_field_errors }}
</div>
{% endif %}

            <form method="POST" class="space-y-4">
              {% csrf_token %}

              <input
                type="text"
                name="username"
                placeholder="Username"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
              />

              <input
                type="password"
                name="password"
                placeholder="Password"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
              />

              <button
                type="submit"
                class="w-full bg-black text-white py-2 rounded-lg hover:opacity-90"
              >
                Login
              </button>
            </form>

            <p class="text-sm text-center mt-4">
              Don’t have an account?
              <a href="{% url 'register' %}" class="text-purple-600"
                >Register</a
              >

              <p class="text-sm text-center mt-4">
                Forgot your password?
              <a href="{% url 'password_reset' %}" class="text-purple-600"
                >Reset</a
              >


            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const images = [
        "{% static 'images/ss.jpg' %}",
        "{% static 'images/sunny.jpg' %}",
        "{% static 'images/handshake.jpg' %}",
        "{% static 'images/phone.jpg' %}",
      ];

      let index = 0;
      let current = document.querySelector(".bg1");
      let next = document.querySelector(".bg2");

      current.style.backgroundImage = `url(${images[0]})`;

      function changeImage() {
        index = (index + 1) % images.length;

        next.style.backgroundImage = `url(${images[index]})`;
        next.style.opacity = 1;
        current.style.opacity = 0;

        setTimeout(() => {
          let temp = current;
          current = next;
          next = temp;
          next.style.opacity = 0;
        }, 1000);
      }

      setInterval(changeImage, 3000);
    </script>
  </body>
</html>
