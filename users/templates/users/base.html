{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect-Us</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-gray-100" style="font-family: &quot;Inter&quot;, sans-serif">
    {% block layout %}

    <div class="min-h-screen md:h-screen flex flex-col md:flex-row md:overflow-hidden">
      <!-- 🔷 SIDEBAR -->
      <div
        class="w-full md:w-64 bg-white shadow-md p-4 md:p-6 flex md:flex-col justify-between "
      >
        <!-- TOP -->
        <div
          class="flex md:flex-col items-center md:items-start gap-4 md:gap-6"
        >
          <!-- Profile -->
         <div class="w-12 h-12 md:w-24 md:h-24 rounded-lg overflow-hidden border-2 border-gray-300">
    <img src="{% static 'images/navlogo.png' %}" 
         class="w-full h-full object-cover">
</div>

          <!-- NAV -->
          <ul class="flex md:flex-col gap-4 text-gray-700 text-sm md:text-base">
            <a href="{% url 'index' %}">
              <li class="hover:text-black">🏠 Home</li>
            </a>

            <a href="{% url 'feed' %}">
              <li class="hover:text-black">🌐 Feed</li>
            </a>

            <a href="{% url 'search' %}">
              <li class="hover:text-black">🔍 Search</li>
            </a>

            <a href="{% url 'my_posts' %}">
              <li class="hover:text-black">👤 My Profile</li>
            </a>
            
          </ul>
        </div>
        

        <!-- LOGOUT -->
        <div class="hidden md:block mt-6">
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="text-red-500 hover:text-red-600">Logout</button>
          </form>
        </div>
      </div>

      <!-- 🔷 MAIN CONTENT -->
      <div class="flex-1 p-6 md:p-10 overflow-y-auto">{% block body %} {% endblock %}</div>
    </div>

    {% endblock %}
  </body>
</html>
