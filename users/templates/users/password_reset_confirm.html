{% extends "users/base.html" %}
{% block body %}
    {% if validlink %}
        <form method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <input type="submit">
        </form>
    {% else %}
        <p>The password reset link was invalid, possibly because it has already been used. Please request a new password reset.</p> 
    {% endif %}

{% endblock  %}
