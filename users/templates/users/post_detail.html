{% extends 'users/base.html' %}

{% block body %}
<button 
    onclick="history.back()" 
    class="mb-4 px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300"
>
    ← Back
</button>

<div class="max-w-2xl mx-auto mt-10 bg-white rounded-2xl shadow-md overflow-hidden">

    <!-- USER -->
    <div class="flex items-center gap-3 px-4 py-3">
        <div class="w-10 h-10 bg-gray-300 rounded-full">{% if post.user.profile.photo %}<img src="{{ post.user.profile.photo.url }}" class="w-full h-full rounded-full object-cover">{% endif %}</div>
        <h2 class="font-semibold">{{ post.user.username }}</h2>
    </div>
    

    <!-- IMAGE -->
    <a href="{% url 'post_detail' post.id %}"><img src="{{ post.image.url }}" class="w-full object-cover"></a>

    <!-- CONTENT -->
    <div class="p-4">
        <h3 class="font-semibold text-lg mb-2">{{ post.title }}</h3>
        <p class="text-gray-600">{{ post.caption }}</p>
    </div>

</div>

{% endblock %}
