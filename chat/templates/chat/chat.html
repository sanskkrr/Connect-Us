{% extends 'users/base.html' %}
{% block body %}

<div class="max-w-3xl mx-auto mt-6">

    <button 
    onclick="history.back()" 
    class="mb-4 px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300"
>
    ← Back
</button>


    <!-- 🔷 Header -->
    <div class="bg-white p-4 rounded-t-xl shadow font-semibold text-lg">
        Chat with {{ other_user.username }}
    </div>

    <!-- 🔷 Chat Box -->
   <div id="chat-box" class="bg-white p-4 rounded-lg h-80 overflow-y-scroll mb-4">
    
    {% for msg in messages %}
        <div class="{% if msg.sender == request.user %}text-right{% else %}text-left{% endif %} mb-2">
            <span class="{% if msg.sender == request.user %}bg-black text-white{% else %}bg-gray-300{% endif %} px-3 py-1 rounded-lg inline-block">
                {{ msg.content }}
            </span>
        </div>
    {% endfor %}

</div>

    <!-- 🔷 Input -->
    <div class="bg-white p-4 rounded-b-xl shadow flex gap-2">
        <input id="message-input" type="text"
               class="flex-1 border px-4 py-2 rounded-lg"
               placeholder="Type a message...">

        <button type="button" onclick="sendMessage()"
                class="bg-black text-white px-6 py-2 rounded-lg">
            Send
        </button>
    </div>

</div>

<!-- 🔥 WebSocket Script -->

<script>
const roomName = "{{ room_name|escapejs }}";
const protocol = window.location.protocol === "https:" ? "wss" : "ws";

let socket = null;

// 🔥 create connection FIRST
function connectSocket() {
    socket = new WebSocket(
        protocol + "://" + window.location.host + "/ws/chat/" + roomName + "/"
    );

    socket.onopen = function () {
        console.log("✅ CONNECTED");
    };

    socket.onmessage = function (e) {
        const data = JSON.parse(e.data);
        const chatBox = document.getElementById("chat-box");

        const messageDiv = document.createElement("div");

        if (data.sender === "{{ request.user.username }}") {
            messageDiv.className = "text-right mb-2";
            messageDiv.innerHTML = `
                <span style="background:black;color:white;padding:6px 10px;border-radius:10px;">
                    ${data.message}
                </span>
            `;
        } else {
            messageDiv.className = "text-left mb-2";
            messageDiv.innerHTML = `
                <span style="background:#d1d5db;padding:6px 10px;border-radius:10px;">
                    ${data.message}
                </span>
            `;
        }

        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    socket.onerror = (e) => console.log("❌ ERROR", e);
    socket.onclose = () => console.log("⚠️ CLOSED");
}

// 🔥 send message ONLY if ready
function sendMessage() {
    console.log("🔥 CLICK WORKING");

    if (!socket || socket.readyState !== WebSocket.OPEN) {
        console.log("❌ Socket not ready");
        return;
    }

    const input = document.getElementById("message-input");
    const message = input.value.trim();

    if (!message) return;

    socket.send(JSON.stringify({
        message: message
    }));

    input.value = "";
}

// 🔥 connect when page loads
connectSocket();
</script>
{% endblock %}
