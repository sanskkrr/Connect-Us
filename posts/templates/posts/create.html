{% extends "users/base.html" %}
{% load static %}

{% block body %}
<button 
    onclick="history.back()" 
    class="mb-4 px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300"
>
    ← Back
</button>

<div class="max-w-2xl mx-auto mt-8">

    <!-- 🔙 Back -->
    <a href="javascript:history.back()" 
       class="text-sm text-gray-500 hover:text-black mb-4 inline-block">
        ← Back
    </a>

    <!-- 🔷 CARD -->
    <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">

        <!-- Title -->
        <h2 class="text-2xl font-semibold mb-6 text-center">
            Create New Post
        </h2>

        <!-- FORM -->
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <!-- Title -->
            <div>
                <label class="block text-sm font-medium mb-1">Title</label>
                {{ form.title }}
            </div>

            <!-- Caption -->
            <div>
                <label class="block text-sm font-medium mb-1">Caption</label>
                {{ form.caption }}
            </div>

            <!-- Upload Area -->
            <div>
                <label class="block text-sm font-medium mb-2">Upload Image</label>

                <label class="flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-xl p-6 cursor-pointer hover:border-black transition">

                    <span class="text-gray-500 text-sm">
                        Click to upload or drag image
                    </span>

                    {{ form.image }}

                </label>
            </div>

            <!-- Image Preview -->
            <img id="preview" class="hidden w-full rounded-xl mt-3 shadow" />

            <!-- Submit -->
            <button 
                type="submit"
                class="w-full bg-black text-white py-3 rounded-xl hover:opacity-90 transition font-medium">
                Post
            </button>

        </form>

    </div>

</div>

<!-- 🔥 Image Preview Script -->
<script>
    const input = document.querySelector('input[type="file"]');
    const preview = document.getElementById('preview');

    input.addEventListener('change', function () {
        const file = this.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.classList.remove('hidden');
        }
    });
</script>

{% endblock %}
