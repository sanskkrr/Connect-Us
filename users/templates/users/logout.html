{% extends "users/base.html" %}
{% load static %}

{% block layout %}
<div class="min-h-screen flex flex-col items-center justify-center bg-gray-100">

    <!-- 🔥 BIG LOGO OUTSIDE CARD -->
    <div class="mb-8 flex flex-col items-center">

        <div class="w-28 h-28 md:w-36 md:h-36 rounded-3xl overflow-hidden shadow-lg">
            <img src="{% static 'images/logo11.png' %}" 
                 class="w-full h-full object-cover">
        </div>

        <h1 class="text-2xl md:text-3xl font-bold mt-4"
            style="font-family: 'Poppins', sans-serif;">
            Connect-Us
        </h1>

    </div>

    <!-- 🔷 CARD -->
    <div class="w-full max-w-xl bg-white rounded-3xl shadow-lg p-10 text-center">

        <h2 class="text-xl md:text-2xl font-semibold mb-3">
            You have been logged out
        </h2>

        <p class="text-gray-500 mb-6">
            See you again soon 👋
        </p>

        <!-- BUTTONS -->
        <div class="flex flex-col md:flex-row gap-4 justify-center">

            <a href="{% url 'login' %}"
               class="px-6 py-2 bg-black text-white rounded-lg hover:opacity-90 transition">
                Login again
            </a>

            <a href="{% url 'register' %}"
               class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
                Create Account
            </a>

        </div>

    </div>

</div>
{% endblock %}
