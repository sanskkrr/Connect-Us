{% extends "users/base.html" %}
{% load static %}

{% block body %}

<div class="min-h-screen flex flex-col items-center  justify-center bg-gradient-to-br from-gray-100 to-gray-200 px-4">

    <!-- 🔷 BRAND -->
    <div class="flex items-center gap-2 mb-6">
        <img src="{% static 'images/navlogo.png' %}" class="w-10 h-10 rounded-md">
        <h1 class="text-2xl font-semibold"
            style="font-family: 'Poppins', sans-serif;">
            Connect-Us
        </h1>
    </div>

    <!-- 🔷 CARD -->
    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl">

        <h2 class="text-xl font-semibold text-center mb-2">
            Reset your password
        </h2>

        <p class="text-gray-500 text-sm text-center mb-6">
            Enter your email and we’ll send you a reset link
        </p>

        <!-- FORM -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <input type="email" name="email" placeholder="Enter your email"
                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">

            <button type="submit"
                class="w-full bg-blue-500 text-white py-3 rounded-xl font-medium hover:bg-blue-600 transition">
                Send Reset Link
            </button>
        </form>

        <!-- BACK -->
        <p class="text-sm text-center mt-6">
            Remember your password?
            <a href="{% url 'login' %}" class="text-blue-500 font-medium">
                Login
            </a>
        </p>

    </div>

</div>

{% endblock %}
